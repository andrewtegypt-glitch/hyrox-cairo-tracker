<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYROX Cairo Training Program</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --accent:#ff4d4d; --accent2:#3ddc97;
    --text:#eef0f3; --muted:#9aa1ac; --border:#2a2e37;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{padding:20px 16px;text-align:center;background:linear-gradient(135deg,#1a1d24,#0f1115);border-bottom:1px solid var(--border);}
  header h1{margin:0;font-size:1.4rem;}
  header p{margin:4px 0 0;color:var(--muted);font-size:0.85rem;}
  .progress-wrap{max-width:700px;margin:16px auto;padding:0 16px;}
  .progress-bar-bg{background:var(--border);border-radius:20px;height:14px;overflow:hidden;}
  .progress-bar-fill{background:linear-gradient(90deg,var(--accent2),#2bb673);height:100%;width:0%;transition:width .3s;}
  .progress-label{font-size:0.8rem;color:var(--muted);margin-top:6px;text-align:center;}
  .tabs{display:flex;overflow-x:auto;gap:8px;padding:8px 16px;max-width:700px;margin:0 auto;}
  .tab-btn{flex:0 0 auto;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:0.8rem;cursor:pointer;white-space:nowrap;}
  .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  main{max-width:700px;margin:0 auto;padding:8px 16px 60px;}
  .week-select{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 16px;}
  .week-chip{padding:6px 12px;border-radius:14px;background:var(--card);border:1px solid var(--border);font-size:0.75rem;cursor:pointer;color:var(--muted);position:relative;}
  .week-chip.active{background:var(--accent2);color:#06251a;border-color:var(--accent2);font-weight:600;}
  .week-chip.complete::after{content:'✓';margin-left:4px;}
  .day-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden;}
  .day-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;background:#20242c;}
  .day-header h3{margin:0;font-size:1rem;}
  .day-header .daynum{color:var(--accent2);font-size:0.75rem;font-weight:600;}
  .ex-list{padding:8px 14px 14px;}
  .ex-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
  .ex-item:last-child{border-bottom:none;}
  .ex-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent2);flex-shrink:0;cursor:pointer;}
  .ex-name{font-weight:600;font-size:0.9rem;cursor:pointer;text-decoration:underline dotted;color:var(--text);}
  .ex-name.checked, .ex-sets.checked{opacity:0.45;text-decoration-line:line-through;}
  .ex-sets{font-size:0.8rem;color:var(--muted);margin-left:auto;text-align:right;flex-shrink:0;max-width:45%;}
  .thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer;border:1px solid var(--border);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--card);border-radius:14px;max-width:420px;width:100%;overflow:hidden;border:1px solid var(--border);position:relative;}
  .modal img{width:100%;height:220px;object-fit:cover;display:block;}
  .modal-body{padding:16px;}
  .modal-body h3{margin:0 0 8px;color:var(--accent2);}
  .modal-body p{margin:0;color:var(--muted);font-size:0.9rem;line-height:1.5;}
  .modal-close{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.6);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;}
  .phase-note{font-size:0.8rem;color:var(--muted);margin-bottom:10px;line-height:1.4;}
  .reset-btn{display:block;margin:20px auto 0;background:none;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;font-size:0.75rem;cursor:pointer;}
  .week-nav{display:flex;justify-content:space-between;align-items:center;margin:6px 0 10px;}
  .week-nav button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:0.8rem;cursor:pointer;}
  .week-nav button:disabled{opacity:0.3;cursor:default;}
  .week-title{font-weight:700;font-size:1rem;color:var(--accent2);}
</style>
</head>
<body>
<header>
  <h1>🏋️ HYROX Cairo Training Program</h1>
  <p>18-week competitive prep · Race day: Nov 14, 2026</p>
</header>
<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0% complete</div>
</div>
<div class="tabs" id="phaseTabs"></div>
<main>
  <div class="phase-note" id="phaseNote"></div>
  <div class="week-select" id="weekSelect"></div>
  <div class="week-nav">
    <button id="prevWeekBtn">← Prev Week</button>
    <span class="week-title" id="weekTitle"></span>
    <button id="nextWeekBtn">Next Week →</button>
  </div>
  <div id="daysContainer"></div>
  <button class="reset-btn" onclick="resetProgress()">Reset all progress</button>
</main>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('show')">✕</button>
    <img id="modalImg" src="" alt="">
    <div class="modal-body">
      <h3 id="modalTitle"></h3>
      <p id="modalDesc"></p>
    </div>
  </div>
</div>

itle":"Easy Shakeout + Mobility","exercises":[{"name":"Rowing (Row Erg)","sets":"15 min very easy"},{"name":"Mobility flow","sets":"10 min"}]}],"18":[{"title":"Light Activation","exercises":[{"name":"Goblet Squat","sets":"2x5 very light"},{"name":"Mobility flow","sets":"10 min"}]},{"title":"Short Easy Cardio","exercises":[{"name":"Rowing (Row Erg)","sets":"15 min easy"}]},{"title":"Rest / Full Recovery","exercises":[{"name":"Complete rest day","sets":"Sleep, hydration, light stretching"}]},{"title":"Race Prep Shakeout","exercises":[{"name":"Light jog","sets":"10 min easy"},{"name":"Wall Ball Shot","sets":"2x10 light"},{"name":"Sled Push","sets":"2x10m light"}]},{"title":"RACE DAY - HYROX Cairo","exercises":[{"name":"Full HYROX Race","sets":"8km run + 8 stations - execute your race plan!"}]}]},"images":{"Goblet Squat":"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/35775b7ee0a2d84b967c433e30bb21af11120214.jpg","Step Up":"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/b36cf8cd37e31920647d1ab223d47d5a76b8ab32.jpg","Romanian Deadlift":"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/8952dd15979d6f4835ab5fc8ac3ca50917384644.jpg","Hip Thrust":"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/98681c036f869d71e18aaa70ec542bd87d3f7b2c.jpg","Farmers Carry":"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/2a3121e0e1a446064cc8eee1189cb22e966e7b93.jpg","Sled Push":"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/23b8e617f3aa6032f7fa39ae4ee8244d405c6c4f.jpg","Sled Pull":"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/f314469ee63812ab945a4f8bb8bfc22c3e99db8f.jpg","Burpee Broad Jump":"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/7ca9768f7b641e5cbe679569f7fbf02a21da1030.jpg","Wall Ball Shot":"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/5c3f2be6fa5915ee71f3f0ed7ce325eb6cb9786e.jpg","SkiErg":"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/a544cbcacfe619bd8d99abdc3712b4ed7d38682b.jpg","Rowing (Row Erg)":"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/dd7babd4aba00439cef87c79d1e7b6ed4dd9eb23.jpg","Sandbag Lunge":"https://pplx-res.cloudinary.com/image/upload/pplx_search_images/580cd790fead1b27a2f215ee4bb08dc65bb4cd80.jpg"},"instructions":{"Goblet Squat":"Hold a dumbbell or kettlebell vertically at chest height. Feet shoulder-width apart, toes slightly out. Squat down keeping chest up and elbows brushing inside knees, drive through heels to stand.","Step Up":"Place one foot fully on a box/bench. Drive through that heel to stand up onto the box, keeping torso upright. Step down with control. Alternate legs.","Romanian Deadlift":"Hold dumbbells/barbell in front of thighs. Hinge at hips, pushing them back while keeping a slight knee bend and flat back. Lower until you feel a hamstring stretch, then drive hips forward to stand.","Hip Thrust":"Upper back on a bench, barbell/dumbbell across hips. Feet flat, knees bent. Drive hips up until body forms a straight line from shoulders to knees, squeeze glutes at top, lower with control.","Farmers Carry":"Hold a heavy dumbbell or kettlebell in each hand at your sides. Stand tall, brace your core, and walk with short controlled steps, keeping shoulders back.","Sled Push":"Load a sled, grip the handles at hip/shoulder height, and drive through your legs in short powerful steps, staying low with a flat back to push the sled forward.","Sled Pull":"Attach a rope/strap to the sled. Facing the sled, pull hand-over-hand while walking backward, or loop it around your waist and walk forward, keeping tension constant.","Burpee Broad Jump":"Drop into a burpee (hands down, chest to floor or push-up), jump feet back in, then explode forward into a broad jump landing softly. Repeat immediately into the next rep.","Wall Ball Shot":"Hold a medicine ball at chest height, squat down to at least parallel, then explode up and throw the ball to a target on the wall above head height. Catch and repeat.","SkiErg":"Stand facing the machine, grip handles overhead, hinge at hips and pull handles down past hips in one fluid motion, using lats and core, then reset.","Rowing (Row Erg)":"Legs push first, then lean back slightly, then pull handle to lower ribs with elbows close to body. Reverse the order to return: arms, body, then legs.","Sandbag Lunge":"Hold a sandbag across the front of shoulders or on one shoulder. Step forward into a lunge, back knee toward the floor, drive through the front heel to step forward into the next lunge."}};
const STORAGE_KEY='hyrox_progress_v2';
const ALL_WEEKS=Object.keys(DATA.weeksData).map(Number).sort((a,b)=>a-b);
let currentPhase=0,currentWeek=DATA.phaseMeta[0].weeks[0];
function loadProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){return{};}}
function saveProgress(p){localStorage.setItem(STORAGE_KEY,JSON.stringify(p));}
function phaseIndexForWeek(w){return DATA.phaseMeta.findIndex(ph=>ph.weeks.includes(w));}
function isWeekComplete(w){const progress=loadProgress();const days=DATA.weeksData[w];let total=0,done=0;days.forEach((day,dIdx)=>{day.exercises.forEach((ex,eIdx)=>{total++;const key=`w${w}_d${dIdx}_e${eIdx}`;if(progress[key])done++;});});return total>0&&done===total;}
function renderTabs(){const tabsEl=document.getElementById('phaseTabs');tabsEl.innerHTML='';DATA.phaseMeta.forEach((ph,idx)=>{const btn=document.createElement('button');btn.className='tab-btn'+(idx===currentPhase?' active':'');btn.textContent=ph.name.replace('Phase '+(idx+1)+': ','');btn.onclick=()=>{currentPhase=idx;currentWeek=ph.weeks[0];render();};tabsEl.appendChild(btn);});}
function renderWeeks(){const wrap=document.getElementById('weekSelect');wrap.innerHTML='';const ph=DATA.phaseMeta[currentPhase];ph.weeks.forEach(w=>{const chip=document.createElement('div');chip.className='week-chip'+(w===currentWeek?' active':'')+(isWeekComplete(w)?' complete':'');chip.textContent='Week '+w;chip.onclick=()=>{currentWeek=w;render();};wrap.appendChild(chip);});}
function renderDays(){const container=document.getElementById('daysContainer');container.innerHTML='';document.getElementById('phaseNote').textContent=DATA.phaseMeta[currentPhase].note||'';document.getElementById('weekTitle').textContent='Week '+currentWeek;const days=DATA.weeksData[currentWeek];const progress=loadProgress();const idxInAll=ALL_WEEKS.indexOf(currentWeek);document.getElementById('prevWeekBtn').disabled=idxInAll<=0;document.getElementById('nextWeekBtn').disabled=idxInAll>=ALL_WEEKS.length-1;days.forEach((day,dIdx)=>{const card=document.createElement('div');card.className='day-card';const header=document.createElement('div');header.className='day-header';header.innerHTML=`<h3>${day.title}</h3><span class="daynum">Day ${dIdx+1} · Week ${currentWeek}</span>`;card.appendChild(header);const list=document.createElement('div');list.className='ex-list';day.exercises.forEach((ex,eIdx)=>{const key=`w${currentWeek}_d${dIdx}_e${eIdx}`;const checked=!!progress[key];const item=document.createElement('div');item.className='ex-item';const cb=document.createElement('input');cb.type='checkbox';cb.checked=checked;cb.onchange=()=>{const p=loadProgress();p[key]=cb.checked;saveProgress(p);updateNameClass(nameSpan,setsSpan,cb.checked);updateProgressBar();renderWeeks();};const img=document.createElement('img');img.className='thumb';img.src=DATA.images[ex.name]||'';img.onclick=()=>openModal(ex.name);const nameSpan=document.createElement('span');nameSpan.className='ex-name'+(checked?' checked':'');nameSpan.textContent=ex.name;nameSpan.onclick=()=>openModal(ex.name);const setsSpan=document.createElement('span');setsSpan.className='ex-sets'+(checked?' checked':'');setsSpan.textContent=ex.sets;item.appendChild(cb);item.appendChild(img);item.appendChild(nameSpan);item.appendChild(setsSpan);list.appendChild(item);});card.appendChild(list);container.appendChild(card);});}
function updateNameClass(nameSpan,setsSpan,checked){nameSpan.classList.toggle('checked',checked);setsSpan.classList.toggle('checked',checked);}
function openModal(name){document.getElementById('modalImg').src=DATA.images[name]||'';document.getElementById('modalTitle').textContent=name;document.getElementById('modalDesc').textContent=DATA.instructions[name]||'';document.getElementById('modalOverlay').classList.add('show');}
function closeModal(e){if(e.target.id==='modalOverlay')e.target.classList.remove('show');}
function updateProgressBar(){const progress=loadProgress();let total=0,done=0;ALL_WEEKS.forEach(w=>{DATA.weeksData[w].forEach((day,dIdx)=>{day.exercises.forEach((ex,eIdx)=>{total++;const key=`w${w}_d${dIdx}_e${eIdx}`;if(progress[key])done++;});});});const pct=total?Math.round((done/total)*100):0;document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressLabel').textContent=`${pct}% complete (${done}/${total} exercises checked)`;}
function resetProgress(){if(confirm('Reset all checked progress? This cannot be undone.')){localStorage.removeItem(STORAGE_KEY);render();}}
document.getElementById('prevWeekBtn').onclick=()=>{const idx=ALL_WEEKS.indexOf(currentWeek);if(idx>0){currentWeek=ALL_WEEKS[idx-1];currentPhase=phaseIndexForWeek(currentWeek);render();}};
document.getElementById('nextWeekBtn').onclick=()=>{const idx=ALL_WEEKS.indexOf(currentWeek);if(idx<ALL_WEEKS.length-1){currentWeek=ALL_WEEKS[idx+1];currentPhase=phaseIndexForWeek(currentWeek);render();}};
function render(){renderTabs();renderWeeks();renderDays();updateProgressBar();}
render();
</script>
